<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>NeoArt - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/feedPage/feedDetail.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
<div class="app-container">
    <aside class="sidebar-left">
        <div class="profile-top">
            <img src="https://i.pravatar.cc/150?u=9" alt="User">
        </div>

        <div class="nav-icons-group">
            <i class="fa-solid fa-house active"></i>
            <i class="fa-solid fa-comment"></i>
        </div>

        <form th:action="@{/logout}" method="post" class="add-bottom" title="Đăng xuất">
            <button type="submit" style="all: unset; cursor: pointer;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </form>
    </aside>

    <main class="main-content">
        <div class="search-bar-container">
            <div class="search-header">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Bạn đang muốn tìm gì...">
                </div>

                <div class="add-bottom" title="Đăng xuất">
                    <i class="fa-solid fa-pen-to-square"></i>
                </div>
            </div>
        </div>

        <div class="post-container">
            <div class="post-back" onclick="window.history.back()" style="cursor: pointer;">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <div class="post-detail-layout">
                <!-- BÊN TRÁI -->
                <div class="post-left">
                    <!-- CONTAINER ẢNH VỚI NÚT ĐIỀU HƯỚNG -->
                    <div class="image-container" style="position: relative;">
                        <!-- ẢNH POST -->
                        <img class="post-main-image" 
                             th:src="@{${post.images[0].filePath}}"
                             id="currentImage"
                             alt="post image"
                             th:if="${post.images != null and #lists.size(post.images) > 0}">
                        
                        <!-- NÚT MŨI TÊN TRÁI (chỉ hiện khi có >= 2 ảnh) -->
                        <button class="nav-arrow nav-arrow-left" 
                                id="prevBtn"
                                th:if="${post.images != null and #lists.size(post.images) > 1}"
                                onclick="changeImage(-1)"
                                style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; z-index: 10;">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        
                        <!-- NÚT MŨI TÊN PHẢI (chỉ hiện khi có >= 2 ảnh) -->
                        <button class="nav-arrow nav-arrow-right" 
                                id="nextBtn"
                                th:if="${post.images != null and #lists.size(post.images) > 1}"
                                onclick="changeImage(1)"
                                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; z-index: 10;">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                        
                        <!-- SỐ THỨ TỰ ẢNH (ví dụ: 1/3) -->
                        <div class="image-counter"
                             th:if="${post.images != null and #lists.size(post.images) > 1}"
                             style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px;">
                            <span id="currentIndex">1</span> / <span th:text="${#lists.size(post.images)}"></span>
                        </div>
                    </div>

                    <!-- ACTION DƯỚI ẢNH -->
                    <div class="post-actions">
                        <div class="left">
                            <i class="fa-regular fa-heart"></i>
                            <span>1.3K</span>
                            <i class="fa-regular fa-comment"></i>
                            <span>300</span>
                        </div>
                        <i class="fa-regular fa-bookmark"></i>
                    </div>
                    <!-- COMMENT INPUT -->
                    <div class="post-comment">
                        <img src="https://i.pravatar.cc/40">
                        <input placeholder="Bạn sẽ nhận xét gì...">
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                </div>
                <!-- BÊN PHẢI -->
                <div class="post-right">
                    <!-- USER + MÔ TẢ -->
                    <div class="post-user">
                        <img class="avatar" src="https://i.pravatar.cc/100">
                        <div>
                            <strong th:text="${post.user.username}">Username</strong>
                            <p th:text="${post.content}">Nội dung bài viết</p>
                        </div>
                    </div>
                    <!-- ẢNH LIÊN QUAN -->
                    <div class="related-section">
                        <h4>Ảnh liên quan</h4>
                        <div class="related-grid">
                            <img src="https://picsum.photos/300/200?random=11">
                            <img src="https://picsum.photos/300/200?random=12">
                            <img src="https://picsum.photos/300/200?random=13">
                            <img src="https://picsum.photos/300/200?random=14">
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <aside class="sidebar-right">
        <h3>Ảnh nổi bật</h3>
        <div class="featured-grid">
            <div class="featured-item"><img src="https://picsum.photos/200/300?random=11"><span>❤️ 1.2k</span></div>
            <div class="featured-item"><img src="https://picsum.photos/200/300?random=12"><span>❤️ 1.1k</span></div>
            <div class="featured-item"><img src="https://picsum.photos/200/300?random=13"><span>❤️ 1.2k</span></div>
            <div class="featured-item"><img src="https://picsum.photos/200/300?random=14"><span>❤️ 1.1k</span></div>
        </div>
    </aside>
</div>

<div class="modal-overlay" id="createPostModal">
    <div class="modal">
        <div class="modal-header">
            <div class="user-info">
                <img src="https://i.pravatar.cc/100?u=9" alt="User">
                <span sec:authentication="name">username</span>
            </div>
            <i class="fa-solid fa-xmark close-modal"></i>
        </div>

        <form th:action="@{/posts/create}" method="post" enctype="multipart/form-data">

            <div class="modal-body">
                <div class="modal-row">
                    <label>Chủ đề:</label>
                    <select name="category">
                        <option value="BEAUTY">Sắc đẹp</option>
                        <option value="NATURE">Thiên nhiên</option>
                        <option value="ART">Nghệ thuật</option>
                    </select>

                    <label class="upload-btn">
                        <i class="fa-regular fa-image"></i> Tải ảnh lên
                        <input type="file"
                               name="images"
                               id="imageInput"
                               accept="image/*"
                               multiple hidden>
                    </label>
                </div>

                <textarea name="content"
                          placeholder="Mô tả ảnh của bạn ..."></textarea>

                <div class="image-preview photo-grid"
                     id="imagePreview"></div>
            </div>

            <div class="modal-footer">
                <button type="submit" class="btn-post">Đăng</button>
            </div>

        </form>

    </div>
</div>
</body>
<script th:src="@{/js/feedPage.js}"></script>
<!-- Lưu danh sách đường dẫn ảnh vào biến JavaScript -->
<script th:inline="javascript">
    /*<![CDATA[*/
    // Tạo mảng chứa đường dẫn ảnh
    var imagePaths = [];
    /*[# th:each="img : ${post.images}"]*/
    imagePaths.push(/*[[@{${img.filePath}}]]*/ '');
    /*[/]*/
    
    var currentImageIndex = 0;
    
    // Chuyển ảnh trái/phải
    function changeImage(direction) {
        if (!imagePaths || imagePaths.length <= 1) return;
        
        currentImageIndex += direction;
        
        // Vòng lặp: nếu quá đầu thì về cuối, quá cuối thì về đầu
        if (currentImageIndex < 0) {
            currentImageIndex = imagePaths.length - 1;
        } else if (currentImageIndex >= imagePaths.length) {
            currentImageIndex = 0;
        }
        
        // Cập nhật src của ảnh
        var currentImage = document.getElementById('currentImage');
        if (currentImage && imagePaths[currentImageIndex]) {
            currentImage.src = imagePaths[currentImageIndex];
        }
        
        // Cập nhật số thứ tự
        var currentIndexSpan = document.getElementById('currentIndex');
        if (currentIndexSpan) {
            currentIndexSpan.textContent = currentImageIndex + 1;
        }
    }
    
    // Hỗ trợ phím mũi tên để chuyển ảnh
    document.addEventListener('keydown', function(event) {
        if (event.key === 'ArrowLeft') {
            changeImage(-1);
        } else if (event.key === 'ArrowRight') {
            changeImage(1);
        }
    });
    /*]]>*/
</script>

</html>
